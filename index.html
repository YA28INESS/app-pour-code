<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application d'Apprentissage Code avec IA</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --sidebar-bg: #252538;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --success-color: #a6e3a1;
            --danger-color: #f38ba8;
            --card-bg: #313244;
            --input-bg: #45475a;
            --ia-green: #23a950;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
        }

        /* Barre latérale */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid #45475a;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            padding: 12px 15px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        /* Zone principale */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        /* --- Onglet COMPTE --- */
        .status-banner {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.1rem;
        }
        .status-disconnected {
            background-color: rgba(243, 139, 168, 0.15);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .status-connected {
            background-color: rgba(166, 227, 161, 0.15);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .auth-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .auth-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            min-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .auth-card h3 {
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #585b70;
            background-color: var(--input-bg);
            color: white;
            font-size: 1rem;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .eye-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-color);
            user-select: none;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- Onglet APPRENDRE --- */
        .learn-intro-btn {
            background-color: var(--ia-green);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 40px auto;
            display: block;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .learn-intro-btn:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .lesson-box {
            display: none;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ia-badge {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--bg-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .lesson-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .lesson-nav-layout {
            display: flex;
            justify-content: space-between;
        }

        .lesson-nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
        }
        .lesson-nav-btn:disabled {
            background-color: #585b70;
            cursor: not-allowed;
        }

        /* --- Onglet EXERCICE --- */
        .exercise-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            height: calc(100% - 60px);
            position: relative;
        }

        /* Rectangle Vert IA à gauche */
        .ia-question-box {
            width: 280px;
            background-color: var(--ia-green);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ia-question-box h3 {
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        .ia-question-text {
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .editor-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        textarea.code-editor {
            width: 100%;
            flex: 1;
            background-color: #11111b;
            color: #a6e3a1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            padding: 15px;
            border: 1px solid #45475a;
            border-radius: 8px;
            resize: none;
            margin-bottom: 60px;
